<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀별 인원 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --line: #d4d4d4;
      --line-soft: #ececec;
      --text: #1f1f1f;
      --text-dim: #666;
      --primary: #2563eb;
      --danger: #dc2626;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 13px;
      line-height: 1.4;
      min-height: 100vh;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    header.topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--line);
    }
    header.topbar h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header.topbar .summary {
      font-size: 12px;
      color: var(--text-dim);
    }
    header.topbar .summary strong { color: var(--text); font-size: 14px; }

    .teams {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .team-row {
      display: grid;
      grid-template-columns: 180px 220px 1fr;
      align-items: stretch;
      border-bottom: 1px solid var(--line);
      min-height: 56px;
    }
    .team-row:last-child { border-bottom: none; }

    .team-name {
      padding: 14px 14px;
      display: flex;
      align-items: center;
      font-weight: 600;
      font-size: 13px;
      border-right: 1px solid var(--line-soft);
      background: #fafafa;
    }

    .team-role {
      padding: 14px 14px;
      display: flex;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
      border-right: 1px solid var(--line-soft);
    }

    .team-members {
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      background: #ffffff;
    }

    .member-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #eef2ff;
      color: #1e3a8a;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.4;
    }
    .member-chip button {
      background: none;
      border: none;
      color: #1e3a8a;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      opacity: 0.6;
    }
    .member-chip button:hover { opacity: 1; color: var(--danger); }

    .add-form {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .add-form input {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      width: 120px;
      font-family: inherit;
      background: #fff;
    }
    .add-form input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .add-form button {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .add-form button:hover { background: #1d4ed8; }

    .count {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      padding-left: 10px;
      white-space: nowrap;
    }

    @media (max-width: 800px) {
      .team-row { grid-template-columns: 1fr; }
      .team-name, .team-role { border-right: none; border-bottom: 1px solid var(--line-soft); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>팀별 인원 관리</h1>
      <div class="summary">전체 인원 <strong id="totalCount">0</strong>명</div>
    </header>

    <div class="teams" id="teams"></div>
  </div>

  <script>
    // 팀 정의 - 이미지 기준 팀명 / 역할 / 색상
    const TEAMS = [
      { id: 'exec',         name: '',                       role: '부사장/본부장',         color: '#dcdcdc' },
      { id: 'global',       name: '',                       role: '글로벌 사업 개발실',   color: '#ffffff' },
      { id: 'ipBiz',        name: '',                       role: 'IP사업실',             color: '#ffffff' },
      { id: 'ipStrategy',   name: '',                       role: 'IP전략실',             color: '#ffffff' },
      { id: 'producer',     name: 'Producer실',             role: '피디 / 코디네이터',    color: '#dcdcdc' },
      { id: 'supervisor',   name: 'Supervisor실',           role: '수퍼바이저',           color: '#7ee0e0' },
      { id: 'storyDR',      name: 'Story Development팀 DR', role: '감독 / 연출',          color: '#a4e9a4' },
      { id: 'storyStory',   name: 'Story Development팀 Story', role: '구성안 & 시나리오',  color: '#fbcfe8' },
      { id: 'storySB',      name: 'Story Development팀 SB', role: '스토리보드 & 애니메틱', color: '#f9a8d4' },
      { id: 'visualDev',    name: 'Visual Development팀',   role: '디자인 & 컬러키',      color: '#fcb045' },
      { id: 'modeling',     name: 'Modeling팀',             role: '모델링',               color: '#5eead4' },
      { id: 'lookDev',      name: 'Look Development팀',     role: '룩디벨롭',             color: '#d9e021' },
      { id: 'cfx',          name: 'CFX팀',                  role: '리깅',                 color: '#fef3a3' },
      { id: 'animation',    name: 'Animation팀',            role: '애니메이션',           color: '#a78bfa' },
      { id: 'simulation',   name: 'Simulation팀',           role: 'Simulation',           color: '#15803d' },
      { id: 'blender',      name: 'Blender팀',              role: 'Blender',              color: '#f59e0b' },
      { id: 'fx',           name: 'FX팀',                   role: '이펙트',               color: '#fda4af' },
      { id: 'lighting',     name: 'Lighting팀',             role: '라이팅 & 렌더',        color: '#3b82f6' },
      { id: 'composite',    name: 'Composite팀',            role: '합성 / 모션그래픽',    color: '#fb923c' },
      { id: 'unreal',       name: 'Unreal팀',               role: '언리얼 TA/TD',         color: '#f3c1d7' },
    ];

    const STORAGE_KEY = 'asmt.team.members.v1';

    function loadMembers() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }

    function saveMembers(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let members = loadMembers();

    // 글자 밝기에 따라 텍스트 색 결정
    function textColorFor(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substring(0, 2), 16);
      const g = parseInt(c.substring(2, 4), 16);
      const b = parseInt(c.substring(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.6 ? '#1f1f1f' : '#ffffff';
    }

    function render() {
      const root = document.getElementById('teams');
      root.innerHTML = '';
      let total = 0;

      TEAMS.forEach((team) => {
        const teamMembers = members[team.id] || [];
        total += teamMembers.length;

        const row = document.createElement('div');
        row.className = 'team-row';

        const nameCell = document.createElement('div');
        nameCell.className = 'team-name';
        nameCell.textContent = team.name;

        const roleCell = document.createElement('div');
        roleCell.className = 'team-role';
        roleCell.style.background = team.color;
        roleCell.style.color = textColorFor(team.color);
        roleCell.textContent = team.role;

        const memberCell = document.createElement('div');
        memberCell.className = 'team-members';

        teamMembers.forEach((name, idx) => {
          const chip = document.createElement('span');
          chip.className = 'member-chip';
          chip.textContent = name;
          const x = document.createElement('button');
          x.type = 'button';
          x.title = '제거';
          x.textContent = '×';
          x.addEventListener('click', () => removeMember(team.id, idx));
          chip.appendChild(x);
          memberCell.appendChild(chip);
        });

        const form = document.createElement('form');
        form.className = 'add-form';
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = '이름 입력';
        input.maxLength = 20;
        const submit = document.createElement('button');
        submit.type = 'submit';
        submit.textContent = '+ 인원';
        form.appendChild(input);
        form.appendChild(submit);
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const name = input.value.trim();
          if (!name) return;
          addMember(team.id, name);
          input.value = '';
        });
        memberCell.appendChild(form);

        const count = document.createElement('span');
        count.className = 'count';
        count.textContent = teamMembers.length + '명';
        memberCell.appendChild(count);

        row.appendChild(nameCell);
        row.appendChild(roleCell);
        row.appendChild(memberCell);
        root.appendChild(row);
      });

      document.getElementById('totalCount').textContent = total;
    }

    function addMember(teamId, name) {
      if (!members[teamId]) members[teamId] = [];
      members[teamId].push(name);
      saveMembers(members);
      render();
    }

    function removeMember(teamId, idx) {
      if (!members[teamId]) return;
      members[teamId].splice(idx, 1);
      saveMembers(members);
      render();
    }

    render();
  </script>
</body>
</html>
